name: CD

on:
  release:
    types: [published]

jobs:
  deploy-devbuild:
    runs-on: ubuntu-latest
    if: github.event.release.prerelease == true

    steps:
      - name: Deploy devbuild to Minecraft Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            PLUGINS_DIR="/srv/minecraft/plugins"
            TAG="${{ github.event.release.tag_name }}"
            JAR_URL="${{ github.event.release.assets[0].browser_download_url }}"

            echo "Deploying devbuild $TAG..."
            rm -f "$PLUGINS_DIR"/Story-*.jar
            curl -sL "$JAR_URL" -o "$PLUGINS_DIR/Story-${TAG}.jar"
            echo "$TAG" > /opt/scripts/.story-plugin-version
            mcrcon -H localhost -P 25575 -p "$MCRCON_PASS" "reload confirm"
            echo "Done - devbuild $TAG deployed"
        env:
          MCRCON_PASS: ${{ secrets.MCRCON_PASS }}

  deploy-stable:
    runs-on: ubuntu-latest
    if: github.event.release.prerelease == false
    environment: production

    steps:
      - name: Deploy stable release to Minecraft Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            PLUGINS_DIR="/srv/minecraft/plugins"
            TAG="${{ github.event.release.tag_name }}"
            JAR_URL="${{ github.event.release.assets[0].browser_download_url }}"

            echo "Deploying stable $TAG..."

            # Back up current jar before replacing
            BACKUP_DIR="/srv/minecraft/plugins/backups"
            mkdir -p "$BACKUP_DIR"
            cp "$PLUGINS_DIR"/Story-*.jar "$BACKUP_DIR/Story-pre-${TAG}.jar" 2>/dev/null || true

            rm -f "$PLUGINS_DIR"/Story-*.jar
            curl -sL "$JAR_URL" -o "$PLUGINS_DIR/Story-${TAG}.jar"
            echo "$TAG" > /opt/scripts/.story-plugin-version
            mcrcon -H localhost -P 25575 -p "$MCRCON_PASS" "reload confirm"
            echo "Done - stable $TAG deployed"
        env:
          MCRCON_PASS: ${{ secrets.MCRCON_PASS }}
